name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build HAP
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sanchuanhehe/harmony-next-pipeline-docker/harmonyos-ci-image:latest
    defaults:
      run:
        working-directory: harmony

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare build profile (unsigned CI config)
        run: cp build-profile.ci.json5 build-profile.json5

      - name: Install ohpm dependencies
        run: ohpm install --all

      - name: Build HAP
        run: |
          hvigorw clean --no-daemon
          hvigorw assembleHap --mode module -p product=default -p buildMode=debug --no-daemon

      - name: Locate HAP file
        id: locate_hap
        run: |
          HAP_REL=$(find entry/build -name "*.hap" | head -1)
          HAP_ABS=$(realpath "$HAP_REL")
          echo "hap_path=$HAP_ABS" >> "$GITHUB_OUTPUT"
          echo "Found HAP: $HAP_ABS"

      - name: Upload HAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: link-my-harmony-hap
          path: ${{ steps.locate_hap.outputs.hap_path }}
          retention-days: 7

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download HAP artifact
        uses: actions/download-artifact@v4
        with:
          name: link-my-harmony-hap
          path: ./dist

      - name: Rename HAP for release
        id: rename
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          HAP_FILE=$(find ./dist -name "*.hap" | head -1)
          NEW_NAME="link-my-harmony-${TAG}.hap"
          mv "$HAP_FILE" "./dist/$NEW_NAME"
          echo "hap_name=$NEW_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 鸿笺 / Folio ${{ github.ref_name }}
          body: |
            ## 鸿笺 / Folio ${{ github.ref_name }}

            HarmonyOS Next client for [Linkwarden](https://github.com/linkwarden/linkwarden). Unofficial, third-party.

            ---

            ### ⚠️ 安装说明 / Installation Notice

            由于鸿蒙系统限制，此 HAP 包为**未签名包**，无法通过常规方式直接安装。请使用以下方式之一：

            > Due to HarmonyOS restrictions, this HAP is **unsigned** and cannot be installed through normal means. Please use one of the following methods:

            #### 方式一：使用 auto-installer 工具（推荐 / Recommended）

            使用 [auto-installer](https://github.com/likuai2010/auto-installer) 工具可以方便地将未签名 HAP 安装到 HarmonyOS 设备。

            1. 下载 [auto-installer](https://github.com/likuai2010/auto-installer/releases)
            2. 连接 HarmonyOS 设备并开启开发者模式（设置 → 关于本机 → 软件版本，连续点击 7 次 / Settings → About → Version → tap 7 times）
            3. 使用 auto-installer 安装 `.hap` 文件

            #### 方式二：通过 hdc 命令行 Sideload

            ```bash
            # 连接设备后执行 / after connecting the device
            hdc install -r link-my-harmony-${{ github.ref_name }}.hap
            ```

            需要在设备上启用 **USB 调试** 并安装 HarmonyOS SDK 中的 `hdc` 工具。

            ---

            ### 文件 / Files

            | 文件 / File | 说明 / Description |
            |-------------|--------------------|
            | `link-my-harmony-${{ github.ref_name }}.hap` | HarmonyOS 应用包（未签名） / HarmonyOS app package (unsigned) |

            ---

            ### 致谢 / Credits

            - 上游服务端 / Upstream server: [Linkwarden](https://github.com/linkwarden/linkwarden)
            - HarmonyOS CI image: [harmony-next-pipeline-docker](https://github.com/sanchuanhehe/harmony-next-pipeline-docker)
          files: ./dist/${{ steps.rename.outputs.hap_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
